name: Release

# Builds two DMGs on macOS (arm64 + x64) and a NSIS installer on
# Windows whenever a version tag like v1.2.3 is pushed. Assets are
# attached to the auto-created GitHub Release, which the in-app
# update checker reads.
#
# We deliberately publish only the three files people install with:
#   - Notion Time Tracker-<ver>-arm64.dmg  (Apple Silicon)
#   - Notion Time Tracker-<ver>-x64.dmg    (Intel Macs)
#   - Notion Time Tracker Setup <ver>.exe  (Windows)
# No .zip, no portable .exe, no .blockmap files — they just add noise
# to the release page.
on:
  push:
    tags:
      - "v*"
  # Manual fallback when a push-tag event gets swallowed by GitHub
  # (it happens; `gh workflow run release.yml -f tag=v0.4.14`).
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to (re)build, e.g. v0.4.14"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-mac:
    name: macOS (arm64 + x64) build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # On workflow_dispatch, check out the supplied tag. On tag-push,
          # github.ref already points at the tag so this is a no-op.
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Build DMGs (arm64 + x64)
        env:
          # Disable electron-builder's auto-publish path; we'll upload assets
          # explicitly in the next step. Also skip code-signing.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ""
        # One electron-builder invocation produces two separate DMGs with
        # arch suffixes in their filenames. We intentionally do NOT use
        # `--universal` because `@electron/universal`'s asar-merge trips
        # on shared Vite `dist/` temp folders; two plain DMGs sidestep it.
        run: npm run pack:mac:both

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: release/*.dmg
          generate_release_notes: true

  build-win:
    name: Windows (x64) build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # On workflow_dispatch, check out the supplied tag. On tag-push,
          # github.ref already points at the tag so this is a no-op.
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Build installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ""
        run: npm run pack:win

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          # Only the Setup installer — skip the portable variant to keep
          # the release page free of files non-devs might grab by mistake.
          files: release/*Setup*.exe
          generate_release_notes: true
