name: Release

# Builds a DMG on macOS (Apple Silicon) and a NSIS installer + portable exe
# on Windows whenever a version tag like v1.2.3 is pushed. Assets are
# attached to the auto-created GitHub Release, which the in-app update
# checker reads.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    name: macOS (arm64) build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Build DMG
        env:
          # Disable electron-builder's auto-publish path; we'll upload assets
          # explicitly in the next step. Also skip code-signing.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ""
        run: npm run pack:mac

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*-mac.zip
            release/*.blockmap
          generate_release_notes: true

  build-win:
    name: Windows (x64) build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Build installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ""
        run: npm run pack:win

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.blockmap
          generate_release_notes: true
