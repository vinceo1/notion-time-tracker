<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F3F3F5"/>
    </linearGradient>
    <radialGradient id="face" cx="0.5" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FAFAFA"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dy="18"/>
      <feComponentTransfer result="shadow">
        <feFuncA type="linear" slope="0.16"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded-square white background (macOS icon proportions) -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- Stopwatch -->
  <g transform="translate(512, 555)" filter="url(#softShadow)">

    <!-- Side lugs (buttons) -->
    <g fill="#17171B">
      <rect x="-300" y="-340" width="68" height="26" rx="8" transform="rotate(-35 -266 -327)"/>
      <rect x="232" y="-340" width="68" height="26" rx="8" transform="rotate(35 266 -327)"/>
    </g>

    <!-- Crown: cap over stem -->
    <rect x="-40" y="-386" width="80" height="58" rx="14" fill="#17171B"/>
    <rect x="-18" y="-418" width="36" height="36" rx="6" fill="#17171B"/>

    <!-- Watch body -->
    <circle cx="0" cy="0" r="308" fill="url(#face)" stroke="#17171B" stroke-width="30"/>

    <!-- Cardinal markers (12 is heavier) -->
    <g fill="#17171B">
      <rect x="-9" y="-272" width="18" height="54" rx="4"/>
      <rect x="-6" y="218" width="12" height="44" rx="3"/>
      <rect x="218" y="-6" width="44" height="12" rx="3"/>
      <rect x="-262" y="-6" width="44" height="12" rx="3"/>
    </g>

    <!-- Intermediate dots -->
    <g fill="#17171B">
      <circle cx="137" cy="-225" r="8"/>
      <circle cx="225" cy="-137" r="8"/>
      <circle cx="225" cy="137" r="8"/>
      <circle cx="137" cy="225" r="8"/>
      <circle cx="-137" cy="225" r="8"/>
      <circle cx="-225" cy="137" r="8"/>
      <circle cx="-225" cy="-137" r="8"/>
      <circle cx="-137" cy="-225" r="8"/>
    </g>

    <!-- Minute hand pointing to ~2 o'clock (gives the icon motion) -->
    <line x1="0" y1="0" x2="128" y2="-175" stroke="#17171B" stroke-width="26" stroke-linecap="round"/>

    <!-- Hub -->
    <circle cx="0" cy="0" r="28" fill="#17171B"/>
    <circle cx="0" cy="0" r="10" fill="#FFFFFF"/>
  </g>
</svg>
